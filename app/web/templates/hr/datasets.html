{% extends "base.html" %}

{% block title %}データセット一覧 - HR{% endblock %}

{% block content %}
<h1>データセット一覧</h1>

<div class="card">
    <h2>新規データセット作成</h2>
    <form method="post" action="/hr/datasets" enctype="multipart/form-data">
        <div class="form-group">
            <label for="name">データセット名</label>
            <input type="text" id="name" name="name" required>
        </div>
        <div class="form-group">
            <label for="employee_master">社員マスタ (CSV)</label>
            <input type="file" id="employee_master" name="employee_master" accept=".csv">
        </div>
        <div class="form-group">
            <label for="project_allocation">プロジェクト配置 (CSV)</label>
            <input type="file" id="project_allocation" name="project_allocation" accept=".csv">
        </div>
        <div class="form-group">
            <label for="working_hours">勤務時間 (CSV)</label>
            <input type="file" id="working_hours" name="working_hours" accept=".csv">
        </div>
        <button type="submit" class="btn btn-primary">作成</button>
    </form>
</div>

<div id="dataset-list"
     hx-get="/hr/datasets"
     hx-trigger="load delay:0s"
     hx-swap="innerHTML">
    {% include "fragments/dataset_list.html" %}
</div>
{% endblock %}
