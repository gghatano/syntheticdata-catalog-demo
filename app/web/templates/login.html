{% extends "base.html" %}

{% block title %}ログイン - 合成データ活用デモ{% endblock %}

{% block content %}
<div class="login-container">
    <h1>ログイン</h1>
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login">
        <div class="form-group">
            <label for="user_id">ユーザーID</label>
            <input type="text" id="user_id" name="user_id" placeholder="例: hr_demo, user_demo_01" required>
        </div>
        <button type="submit" class="btn btn-primary">ログイン</button>
    </form>
    <div class="login-help">
        <p>デモ用アカウント:</p>
        <ul>
            <li><strong>hr_demo</strong> - 人事部ユーザー</li>
            <li><strong>user_demo_01</strong> - 提案者ユーザー</li>
            <li><strong>user_demo_02</strong> - 提案者ユーザー</li>
        </ul>
    </div>
</div>
{% endblock %}
